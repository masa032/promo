name: "粉絲頁發文 — Daily Facebook Post"

# 此 workflow 僅負責發 Facebook 粉絲頁貼文，不重新生成網站
# 網站更新請見 auto-update.yml
on:
  schedule:
    - cron: '30 1 * * *'    # 台北 09:30 — 早安商品推薦
    - cron: '17 6 * * *'    # 台北 14:17 — 下午娛樂/影片
    - cron: '45 12 * * *'   # 台北 20:45 — 晚間商品推薦
  workflow_dispatch:         # 手動觸發（測試用）

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-to-facebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post to Facebook page
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: python facebook_page_poster.py
